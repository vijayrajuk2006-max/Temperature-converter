<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* BACKGROUND IMAGE */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("https://images.unsplash.com/photo-1501973801540-537f08ccae7b?auto=format&fit=crop&w=1600&q=80") no-repeat center center/cover;
    position:relative;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(3px);
    z-index:0;
}

/* CONTAINER */
.container{
    position:relative;
    z-index:1;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:40px;
    width:350px;
    border-radius:15px;
    text-align:center;
    color:white;
    box-shadow:0 15px 30px rgba(0,0,0,0.4);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.container h2{
    margin-bottom:25px;
}

input, select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    background:#00c6ff;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0072ff;
    transform:scale(1.05);
}

.result{
    margin-top:20px;
    font-size:18px;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">
    <h2>🌡 Temperature Converter</h2>

    <input type="number" id="tempInput" placeholder="Enter temperature">

    <select id="unit">
        <option value="c">Celsius</option>
        <option value="f">Fahrenheit</option>
        <option value="k">Kelvin</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div class="result" id="result"></div>
</div>

<script>
function convertTemp(){
    let temp = parseFloat(document.getElementById("tempInput").value);
    let unit = document.getElementById("unit").value;
    let resultBox = document.getElementById("result");

    if(isNaN(temp)){
        resultBox.innerHTML = "⚠ Please enter a valid number!";
        return;
    }

    let resultText = "";

    if(unit === "c"){
        let f = (temp * 9/5) + 32;
        let k = temp + 273.15;
        resultText = `${temp}°C = ${f.toFixed(2)}°F | ${k.toFixed(2)}K`;
    }
    else if(unit === "f"){
        let c = (temp - 32) * 5/9;
        let k = c + 273.15;
        resultText = `${temp}°F = ${c.toFixed(2)}°C | ${k.toFixed(2)}K`;
    }
    else if(unit === "k"){
        let c = temp - 273.15;
        let f = (c * 9/5) + 32;
        resultText = `${temp}K = ${c.toFixed(2)}°C | ${f.toFixed(2)}°F`;
    }

    resultBox.innerHTML = resultText;
}
</script>

</body>
</html>
